<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="48%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sg-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#0f1229"/>
    </linearGradient>
    <radialGradient id="sg-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="sg-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg-hex-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="26" fill="url(#sg-bg)"/>

  <!-- Center glow -->
  <circle cx="100" cy="100" r="90" fill="url(#sg-center)"/>

  <!-- Dot matrix texture -->
  <circle cx="20" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="46.5" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="73" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="99.5" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="126" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="152.5" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="20" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="20" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="46.5" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="73" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="99.5" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="126" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="152.5" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="46.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="20" cy="73" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="46.5" cy="73" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="73" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="20" cy="99.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="99.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="20" cy="126" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="46.5" cy="126" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="126" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="20" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="46.5" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="73" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="99.5" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="126" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="152.5" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="152.5" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="20" cy="179" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="46.5" cy="179" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="73" cy="179" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="99.5" cy="179" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="126" cy="179" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="152.5" cy="179" r="0.7" fill="#fff" opacity="0.045"/>
  <circle cx="179" cy="179" r="0.7" fill="#fff" opacity="0.045"/>

  <!-- Outer hexagon -->
  <polygon points="100,13 175,56 175,144 100,187 25,144 25,56"
    fill="none" stroke="url(#sg-grad)" stroke-width="1.6" opacity="0.72"
    filter="url(#sg-hex-glow)"/>

  <!-- Inner dashed hexagon -->
  <polygon points="100,28 162,63.5 162,136.5 100,172 38,136.5 38,63.5"
    fill="none" stroke="url(#sg-grad)" stroke-width="0.5"
    stroke-dasharray="3 7" opacity="0.18"/>

  <!-- Vertex dots -->
  <circle cx="100" cy="13"  r="3" fill="#818cf8" opacity="0.95"/>
  <circle cx="175" cy="56"  r="3" fill="#9880fb" opacity="0.95"/>
  <circle cx="175" cy="144" r="3" fill="#a78bfa" opacity="0.95"/>
  <circle cx="100" cy="187" r="3" fill="#22d3ee" opacity="0.95"/>
  <circle cx="25"  cy="144" r="3" fill="#a78bfa" opacity="0.95"/>
  <circle cx="25"  cy="56"  r="3" fill="#818cf8" opacity="0.95"/>

  <!-- Circuit trace — top (down then right) -->
  <polyline points="100,13 100,40 122,40"
    fill="none" stroke="#818cf8" stroke-width="1.1"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <rect x="119" y="37" width="6" height="6" rx="1.2"
    fill="none" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
  <circle cx="122" cy="40" r="1.8" fill="#818cf8" opacity="0.85"/>

  <!-- Circuit trace — top-right (left then down) -->
  <polyline points="175,56 150,56 150,78"
    fill="none" stroke="#9880fb" stroke-width="1.1"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <rect x="147" y="75" width="6" height="6" rx="1.2"
    fill="none" stroke="#9880fb" stroke-width="0.9" opacity="0.6"/>
  <circle cx="150" cy="78" r="1.8" fill="#9880fb" opacity="0.85"/>

  <!-- Circuit trace — bottom-right (left then up) -->
  <polyline points="175,144 150,144 150,122"
    fill="none" stroke="#a78bfa" stroke-width="1.1"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <rect x="147" y="119" width="6" height="6" rx="1.2"
    fill="none" stroke="#a78bfa" stroke-width="0.9" opacity="0.6"/>
  <circle cx="150" cy="122" r="1.8" fill="#a78bfa" opacity="0.85"/>

  <!-- Circuit trace — bottom (up then left) -->
  <polyline points="100,187 100,160 78,160"
    fill="none" stroke="#22d3ee" stroke-width="1.1"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <rect x="75" y="157" width="6" height="6" rx="1.2"
    fill="none" stroke="#22d3ee" stroke-width="0.9" opacity="0.6"/>
  <circle cx="78" cy="160" r="1.8" fill="#22d3ee" opacity="0.85"/>

  <!-- Circuit trace — bottom-left (right then up) -->
  <polyline points="25,144 50,144 50,122"
    fill="none" stroke="#a78bfa" stroke-width="1.1"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <rect x="47" y="119" width="6" height="6" rx="1.2"
    fill="none" stroke="#a78bfa" stroke-width="0.9" opacity="0.6"/>
  <circle cx="50" cy="122" r="1.8" fill="#a78bfa" opacity="0.85"/>

  <!-- Circuit trace — top-left (right then down) -->
  <polyline points="25,56 50,56 50,78"
    fill="none" stroke="#818cf8" stroke-width="1.1"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <rect x="47" y="75" width="6" height="6" rx="1.2"
    fill="none" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
  <circle cx="50" cy="78" r="1.8" fill="#818cf8" opacity="0.85"/>

  <!-- Mid edge accent lines -->
  <line x1="25" y1="100" x2="38" y2="100" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
  <line x1="162" y1="100" x2="175" y2="100" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <circle cx="38"  cy="100" r="1.2" fill="#818cf8" opacity="0.4"/>
  <circle cx="162" cy="100" r="1.2" fill="#22d3ee" opacity="0.4"/>

  <!-- SG initials -->
  <text x="100" y="121"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif"
    font-size="76" font-weight="900" letter-spacing="-4"
    fill="url(#sg-grad)" filter="url(#sg-glow)">SG</text>

  <!-- DEV micro label -->
  <text x="100" y="152"
    text-anchor="middle"
    font-family="monospace,'Courier New',monospace"
    font-size="7.5" font-weight="600" letter-spacing="3.5"
    fill="url(#sg-grad)" opacity="0.45">DEV</text>
</svg>
